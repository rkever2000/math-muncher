<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Math Muncher</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Nunito', sans-serif;
  background: linear-gradient(180deg, #6C3FC5 0%, #9B59B6 40%, #2ECC71 100%);
  min-height: 100vh; max-width: 375px; margin: 0 auto;
  overflow: hidden; touch-action: manipulation;
  -webkit-user-select: none; user-select: none;
  position: relative;
}
.screen { display: none; flex-direction: column; align-items: center;
  justify-content: center; height: 100vh; padding: 20px; text-align: center; }
.screen.active { display: flex; }

/* START SCREEN */
#startScreen { gap: 20px; }
#startScreen h1 { font-family: 'Fredoka One', cursive; font-size: 48px;
  color: #FFD700; text-shadow: 3px 3px 0 #E67E22, 6px 6px 0 rgba(0,0,0,.15);
  animation: titleBounce 1.5s ease-in-out infinite; }
@keyframes titleBounce {
  0%,100% { transform: scale(1) rotate(-2deg); }
  50% { transform: scale(1.08) rotate(2deg); }
}
.start-btn { font-family: 'Fredoka One', cursive; font-size: 28px;
  padding: 18px 50px; border: none; border-radius: 50px;
  background: linear-gradient(135deg, #FFD700, #F39C12); color: #6C3FC5;
  box-shadow: 0 6px 0 #D4880F, 0 10px 20px rgba(0,0,0,.25);
  cursor: pointer; transition: transform .1s; }
.start-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #D4880F; }

/* HUD */
.hud { display: flex; justify-content: space-between; align-items: center;
  width: 100%; padding: 10px 5px; position: absolute; top: 10px; left: 0; z-index: 10; }
.hearts { font-size: 28px; padding-left: 10px; }
.hearts .heart { display: inline-block; transition: transform .3s; }
.hearts .heart.lost { transform: scale(0); opacity: 0; }
.score { font-family: 'Fredoka One', cursive; font-size: 22px; color: #FFD700;
  background: rgba(0,0,0,.25); padding: 5px 15px; border-radius: 20px; margin-right: 10px; }
.level-badge { font-family: 'Fredoka One', cursive; font-size: 16px; color: #fff;
  background: #E74C3C; padding: 4px 12px; border-radius: 15px; }

/* PROBLEM */
.problem { font-family: 'Fredoka One', cursive; font-size: 44px; color: #fff;
  text-shadow: 2px 2px 0 rgba(0,0,0,.2); margin-top: 60px;
  background: rgba(255,255,255,.15); padding: 12px 30px; border-radius: 20px;
  animation: popIn .4s ease-out; }
@keyframes popIn { 0% { transform: scale(0); } 60% { transform: scale(1.15); } 100% { transform: scale(1); } }

/* MONSTER */
.monster-wrap { position: relative; width: 180px; height: 180px; margin: 15px auto; }
.monster-body { width: 160px; height: 140px; background: #2ECC71; border-radius: 50% 50% 45% 45%;
  position: absolute; bottom: 0; left: 10px;
  box-shadow: inset -15px -10px 0 rgba(0,0,0,.1); transition: transform .3s; }
.monster-body::before, .monster-body::after { content: ''; position: absolute; border-radius: 50%; }
/* bumps */
.monster-body::before { width: 30px; height: 30px; background: #27AE60; top: -12px; left: 30px; }
.monster-body::after { width: 22px; height: 22px; background: #27AE60; top: -8px; right: 25px; }
.eye { width: 44px; height: 48px; background: #fff; border-radius: 50%;
  position: absolute; top: 15px; box-shadow: inset 0 -3px 6px rgba(0,0,0,.1);
  overflow: hidden; }
.eye-left { left: 28px; }
.eye-right { right: 28px; }
.pupil { width: 20px; height: 22px; background: #2C3E50; border-radius: 50%;
  position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
  transition: all .3s; }
.pupil::after { content: ''; width: 7px; height: 7px; background: #fff;
  border-radius: 50%; position: absolute; top: 3px; right: 2px; }
.mouth { width: 70px; height: 35px; background: #C0392B; border-radius: 0 0 50px 50px;
  position: absolute; bottom: 22px; left: 50%; transform: translateX(-50%);
  overflow: hidden; transition: all .3s; border-top: 3px solid #922B21; }
.tongue { width: 30px; height: 20px; background: #E74C3C; border-radius: 50%;
  position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%); }
/* Chomp */
.monster-wrap.chomp .mouth { height: 50px; width: 80px; border-radius: 0 0 60px 60px; }
.monster-wrap.chomp .monster-body { transform: scale(1.1); }
/* Sad */
.monster-wrap.sad .mouth { height: 8px; width: 40px; border-radius: 50px; bottom: 28px;
  background: #922B21; }
.monster-wrap.sad .pupil { bottom: 16px; }
.monster-wrap.sad .monster-body { background: #7DCEA0; }
/* Idle bounce */
@keyframes idleBounce { 0%,100%{ transform: translateY(0); } 50%{ transform: translateY(-8px); } }
.monster-wrap.idle { animation: idleBounce 2s ease-in-out infinite; }

/* ANSWER BUBBLES */
.answers { display: flex; gap: 15px; justify-content: center; margin-top: 20px; width: 100%; padding: 0 15px; }
.answer-btn { flex: 1; max-width: 110px; height: 90px; border: none; border-radius: 25px;
  font-family: 'Fredoka One', cursive; font-size: 36px; color: #fff; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 6px 0 rgba(0,0,0,.2), 0 8px 15px rgba(0,0,0,.15);
  transition: transform .1s; animation: bubbleIn .5s ease-out backwards; }
.answer-btn:nth-child(1) { background: linear-gradient(135deg, #E74C3C, #C0392B); animation-delay: .1s; }
.answer-btn:nth-child(2) { background: linear-gradient(135deg, #3498DB, #2471A3); animation-delay: .2s; }
.answer-btn:nth-child(3) { background: linear-gradient(135deg, #F39C12, #D68910); animation-delay: .3s; }
.answer-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,.2); }
@keyframes bubbleIn { 0% { transform: scale(0) rotate(-10deg); opacity: 0; }
  60% { transform: scale(1.15) rotate(3deg); } 100% { transform: scale(1) rotate(0); } }
.answer-btn.correct { animation: correctPulse .5s ease-out; background: #2ECC71 !important; }
.answer-btn.wrong { animation: wrongShake .5s ease-out; }
@keyframes correctPulse { 0% { transform: scale(1); } 40% { transform: scale(1.25); } 100% { transform: scale(1); } }
@keyframes wrongShake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-12px); }
  40% { transform: translateX(12px); } 60% { transform: translateX(-8px); } 80% { transform: translateX(8px); } }

/* SCREEN SHAKE */
@keyframes screenShake { 0%,100% { transform: translate(0); }
  10% { transform: translate(-5px,3px); } 30% { transform: translate(5px,-3px); }
  50% { transform: translate(-3px,5px); } 70% { transform: translate(3px,-5px); } }
body.shake { animation: screenShake .4s ease-out; }

/* LEVEL UP */
#levelScreen { background: rgba(0,0,0,.7); position: fixed; top: 0; left: 0;
  width: 100%; height: 100%; z-index: 100; gap: 15px; }
#levelScreen h2 { font-family: 'Fredoka One', cursive; font-size: 42px;
  color: #FFD700; animation: titleBounce 1s ease-in-out infinite; }
#levelScreen p { font-size: 24px; color: #fff; }
.confetti-piece { position: fixed; width: 10px; height: 10px; border-radius: 2px;
  animation: confettiFall linear forwards; z-index: 101; pointer-events: none; }
@keyframes confettiFall { 0% { opacity: 1; transform: translateY(-20px) rotate(0); }
  100% { opacity: 0; transform: translateY(100vh) rotate(720deg); } }

/* GAME OVER */
#gameOverScreen { gap: 15px; }
#gameOverScreen h2 { font-family: 'Fredoka One', cursive; font-size: 40px; color: #E74C3C; }
#gameOverScreen .final-score { font-family: 'Fredoka One', cursive; font-size: 60px;
  color: #FFD700; text-shadow: 3px 3px 0 rgba(0,0,0,.2); }

/* STARS */
.stars { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden;
  pointer-events: none; z-index: 0; }
.star { position: absolute; width: 4px; height: 4px; background: rgba(255,255,255,.6);
  border-radius: 50%; animation: twinkle 2s ease-in-out infinite; }
@keyframes twinkle { 0%,100% { opacity: .3; } 50% { opacity: 1; } }

/* +10 floating text */
.plus-ten { position: absolute; font-family: 'Fredoka One', cursive; font-size: 32px;
  color: #FFD700; pointer-events: none; animation: floatUp .8s ease-out forwards; z-index: 50; }
@keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-60px) scale(1.3); } }
</style>
</head>
<body>

<!-- Stars background -->
<div class="stars" id="stars"></div>

<!-- START SCREEN -->
<div class="screen active" id="startScreen">
  <div class="monster-wrap idle" style="transform:scale(1.3);margin-bottom:10px">
    <div class="monster-body">
      <div class="eye eye-left"><div class="pupil"></div></div>
      <div class="eye eye-right"><div class="pupil"></div></div>
      <div class="mouth"><div class="tongue"></div></div>
    </div>
  </div>
  <h1>Math<br>Muncher</h1>
  <p style="color:#fff;font-size:18px">Feed the monster the right answer!</p>
  <button class="start-btn" onclick="startGame()">PLAY!</button>
</div>

<!-- GAME SCREEN -->
<div class="screen" id="gameScreen">
  <div class="hud">
    <div class="hearts" id="hearts"></div>
    <div style="display:flex;gap:8px;align-items:center">
      <div class="level-badge" id="levelBadge">Lv 1</div>
      <div class="score" id="scoreDisplay">0</div>
    </div>
  </div>
  <div class="problem" id="problem"></div>
  <div class="monster-wrap idle" id="monster">
    <div class="monster-body">
      <div class="eye eye-left"><div class="pupil"></div></div>
      <div class="eye eye-right"><div class="pupil"></div></div>
      <div class="mouth"><div class="tongue"></div></div>
    </div>
  </div>
  <div class="answers" id="answers"></div>
</div>

<!-- LEVEL UP SCREEN -->
<div class="screen" id="levelScreen">
  <h2 id="levelText">Level 2!</h2>
  <p>Amazing job!</p>
</div>

<!-- GAME OVER SCREEN -->
<div class="screen" id="gameOverScreen">
  <div class="monster-wrap sad" style="transform:scale(1.2);margin-bottom:10px">
    <div class="monster-body">
      <div class="eye eye-left"><div class="pupil"></div></div>
      <div class="eye eye-right"><div class="pupil"></div></div>
      <div class="mouth"><div class="tongue"></div></div>
    </div>
  </div>
  <h2>Game Over!</h2>
  <p style="color:#ddd;font-size:18px">You scored</p>
  <div class="final-score" id="finalScore">0</div>
  <button class="start-btn" onclick="startGame()">Play Again!</button>
</div>

<script>
// Audio
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function ensureAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }
function playNoise(dur, gain, filterFreq) {
  ensureAudio();
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const filt = audioCtx.createBiquadFilter(); filt.type = 'bandpass'; filt.frequency.value = filterFreq; filt.Q.value = 1.5;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(gain, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + dur);
  src.connect(filt); filt.connect(g); g.connect(audioCtx.destination);
  src.start(); src.stop(audioCtx.currentTime + dur);
}
function playTone(freq, type, dur, vol, slide) {
  ensureAudio();
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, audioCtx.currentTime);
  if (slide) o.frequency.linearRampToValueAtTime(slide, audioCtx.currentTime + dur);
  g.gain.setValueAtTime(vol || .25, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}
function clapSound() {
  const u = new SpeechSynthesisUtterance('Gayatri, well done!');
  u.rate = 1.05; u.pitch = 1.3; u.volume = 1;
  speechSynthesis.speak(u);
  // cheerful chime on top
  playTone(660, 'sine', .12, .2);
  setTimeout(() => playTone(880, 'sine', .12, .18), 100);
  setTimeout(() => playTone(1100, 'sine', .15, .15), 200);
}
function booSound() {
  const u = new SpeechSynthesisUtterance('Gayatri, wrong answer, try again.');
  u.rate = 1.05; u.pitch = 1.0; u.volume = 1;
  speechSynthesis.speak(u);
  // sad tone
  playTone(220, 'sawtooth', .5, .12, 100);
  setTimeout(() => playTone(260, 'sawtooth', .4, .1, 140), 200);
}
function levelUpSound() { [0,100,200,300,400].forEach((d,i) => setTimeout(() => playTone(523+i*80, 'sine', .15, .25), d)); }

// State
let state = { score: 0, lives: 3, streak: 0, level: 1, correct: 0, busy: false };

// Stars
(function makeStars() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 30; i++) {
    const s = document.createElement('div'); s.className = 'star';
    s.style.left = Math.random()*100+'%'; s.style.top = Math.random()*100+'%';
    s.style.animationDelay = Math.random()*3+'s'; s.style.width = s.style.height = (2+Math.random()*3)+'px';
    c.appendChild(s);
  }
})();

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startGame() {
  state = { score: 0, lives: 3, streak: 0, level: 1, correct: 0, busy: false };
  updateHUD(); showScreen('gameScreen'); nextProblem();
}

function updateHUD() {
  const h = document.getElementById('hearts');
  h.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const s = document.createElement('span'); s.className = 'heart';
    s.textContent = i < state.lives ? '\u2764\uFE0F' : ''; s.style.marginRight = '4px';
    h.appendChild(s);
  }
  document.getElementById('scoreDisplay').textContent = state.score;
  document.getElementById('levelBadge').textContent = 'Lv ' + state.level;
}

function nextProblem() {
  state.busy = false;
  const monster = document.getElementById('monster');
  monster.className = 'monster-wrap idle';
  const maxNum = Math.min(10 + state.level * 2, 20);
  let a, b, op, answer;
  if (Math.random() < .5) {
    op = '+'; a = Math.floor(Math.random() * maxNum) + 1; b = Math.floor(Math.random() * (20 - a)) + 1;
    if (b < 1) b = 1; answer = a + b;
  } else {
    op = '\u2212'; a = Math.floor(Math.random() * maxNum) + 2; b = Math.floor(Math.random() * a);
    answer = a - b;
  }
  document.getElementById('problem').textContent = a + ' ' + op + ' ' + b + ' = ?';
  // force re-animation
  const p = document.getElementById('problem');
  p.style.animation = 'none'; p.offsetHeight; p.style.animation = '';

  const wrongs = new Set();
  while (wrongs.size < 2) {
    let w = answer + (Math.random() < .5 ? 1 : -1) * (Math.floor(Math.random() * 5) + 1);
    if (w < 0) w = answer + Math.floor(Math.random() * 5) + 1;
    if (w !== answer && w >= 0) wrongs.add(w);
  }
  const options = [answer, ...wrongs].sort(() => Math.random() - .5);
  const cont = document.getElementById('answers');
  cont.innerHTML = '';
  options.forEach(val => {
    const btn = document.createElement('button'); btn.className = 'answer-btn';
    btn.textContent = val;
    btn.onclick = () => handleAnswer(val, answer, btn);
    cont.appendChild(btn);
  });
}

function handleAnswer(val, correct, btn) {
  if (state.busy) return;
  state.busy = true;
  const monster = document.getElementById('monster');
  monster.classList.remove('idle');
  // disable all buttons
  document.querySelectorAll('.answer-btn').forEach(b => b.style.pointerEvents = 'none');

  if (val === correct) {
    clapSound();
    btn.classList.add('correct');
    monster.classList.add('chomp');
    state.score += 10;
    state.streak++;
    state.correct++;
    updateHUD();
    // floating +10
    const ft = document.createElement('div'); ft.className = 'plus-ten';
    ft.textContent = '+10'; ft.style.left = '50%'; ft.style.top = '40%';
    ft.style.transform = 'translateX(-50%)';
    document.getElementById('gameScreen').appendChild(ft);
    setTimeout(() => ft.remove(), 800);

    if (state.streak > 0 && state.streak % 5 === 0) {
      state.level++;
      setTimeout(() => showLevelUp(), 600);
    } else {
      setTimeout(nextProblem, 800);
    }
  } else {
    booSound();
    btn.classList.add('wrong');
    monster.classList.add('sad');
    document.body.classList.add('shake');
    state.lives--;
    state.streak = 0;
    updateHUD();
    // animate heart loss
    const hearts = document.querySelectorAll('.heart');
    if (hearts[state.lives]) hearts[state.lives].classList.add('lost');
    setTimeout(() => document.body.classList.remove('shake'), 400);

    if (state.lives <= 0) {
      setTimeout(gameOver, 1000);
    } else {
      setTimeout(nextProblem, 1200);
    }
  }
}

function showLevelUp() {
  levelUpSound();
  document.getElementById('levelText').textContent = 'Level ' + state.level + '!';
  showScreen('levelScreen');
  spawnConfetti();
  setTimeout(() => { showScreen('gameScreen'); nextProblem(); }, 2200);
}

function spawnConfetti() {
  const colors = ['#FFD700','#E74C3C','#3498DB','#2ECC71','#F39C12','#9B59B6','#FF69B4'];
  for (let i = 0; i < 50; i++) {
    const c = document.createElement('div'); c.className = 'confetti-piece';
    c.style.left = Math.random()*100+'%'; c.style.top = '-10px';
    c.style.background = colors[Math.floor(Math.random()*colors.length)];
    c.style.width = (6+Math.random()*8)+'px'; c.style.height = (6+Math.random()*8)+'px';
    c.style.borderRadius = Math.random()>.5?'50%':'2px';
    c.style.animationDuration = (1.5+Math.random()*2)+'s';
    c.style.animationDelay = Math.random()*.5+'s';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 4000);
  }
}

function gameOver() {
  document.getElementById('finalScore').textContent = state.score;
  showScreen('gameOverScreen');
}
</script>
</body>
</html>
